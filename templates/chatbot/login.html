{% load static %}

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - IntelliChat</title>

<link rel="stylesheet" href="{% static 'css/login.css' %}">

<!-- Font Awesome Icons -->

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- LOGO -->

<div class="logo-section">
    <img src="{% static 'images/logo.png' %}" class="auth-logo" alt="IntelliChat Logo">
</div>

<!-- LOGIN CARD -->

<div class="auth-container">

```
<div class="auth-card">

    <div class="auth-form">

        <h2>Login</h2>
        <p class="auth-subtitle">Neque porro quisquam est qui dolorem ipsum</p>

        <form method="POST">
            {% csrf_token %}

            <!-- EMAIL -->
            <div class="form-group">
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email"
                           name="email"
                           placeholder="TIP e-mail"
                           required>
                </div>
            </div>

            <div class="form-links">
                <a href="#" class="forgot-link">Forgot e-mail</a>
            </div>


            <!-- PASSWORD -->
            <div class="form-group">
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password"
                           name="password"
                           placeholder="Password"
                           required>
                    <i class="fas fa-eye eye-icon"></i>
                </div>
            </div>

            <div class="form-links">
                <a href="#" class="forgot-link">Forgot password</a>
            </div>


            <!-- REGISTER TEXT -->
            <div class="auth-footer">
                <p>Don't have an account yet? 
                <a href="{% url 'signup' %}" class="auth-link">Register here</a></p>
            </div>


            <!-- BUTTON -->
            <button type="submit" class="auth-btn">
                Sign up
            </button>

        </form>

    </div>

</div>
```

</div>

</body>
</html>
