{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>IntelliChat</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="{% static 'css/chatbot.css' %}">
    <link rel="stylesheet" href="{% static 'css/profile.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body>

<header class="header">
    <div class="header-content">

        <!-- Menu Icon on the left -->
        <div class="menu-icon">
            <i class="fas fa-bars"></i>
        </div>

        <!-- Logo in the center -->
        <h1 class="logo">
            <img src="{% static 'images/logo.png' %}">
        </h1>

        <!-- Header Icons on the right -->
        <div class="header-icons">
    <!-- Notification Icon -->
            <a href="#" class="header-icon notif-icon">
                <i class="fas fa-bell"></i>
                <span class="notif-badge"><!-- Number of notif --></span>
            </a>

            <!-- Profile Icon -->
            <a href="{% url 'profile' %}" class="header-icon profile-icon">
                {% if user.is_authenticated and user.profile_picture %}
                <img src="{{ user.profile_picture.url }}" alt="Profile">
                {% else %}
                <img src="{% static 'images/profile.png' %}" alt="Profile">
                {% endif %}
            </a>
        </div>

    </div>
</header>



<div class="main-container">

    <aside class="sidebar">

        <div class="sidebar-item active">
            <i class="fas fa-plus"></i>
            <span>New chat</span>
        </div>

    </aside>

    <main class="chat-area">

        <!-- Welcome screen (centered, visible before first message) -->
        <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-message">
                {% if user.is_authenticated %}
                <h3>Hi, {{ user.first_name }}</h3>
                {% else %}
                <h3>Hi, Guest</h3>
                {% endif %}
                <h1>How can we help?</h1>
            </div>

            <div class="chat-input-container">
                <label for="file-upload" class="paperclip-icon-label">
                    <i class="fas fa-paperclip"></i>
                </label>
                <input type="file" id="file-upload" class="file-upload" multiple>
                <div class="uploaded-files-container" id="uploadedFilesContainer"></div>
                <input type="text" class="chat-input" id="welcomeInput" placeholder="Ask anything">
                <div class="send-button" id="welcomeSendBtn">
                    <i class="fas fa-paper-plane"></i>
                </div>
            </div>
        </div>

        <!-- Active chat screen (hidden until first message) -->
        <div class="active-chat" id="activeChat" style="display: none;">
            <div class="chat-messages" id="chatMessages"></div>

            <div class="chat-input-wrapper">
                <div class="chat-input-container">
                    <label for="file-upload-active" class="paperclip-icon-label">
                        <i class="fas fa-paperclip"></i>
                    </label>
                    <input type="file" id="file-upload-active" class="file-upload" multiple>
                    <div class="uploaded-files-container" id="uploadedFilesContainerActive"></div>
                    <input type="text" class="chat-input" id="chatInputActive" placeholder="Ask anything">
                    <div class="send-button" id="activeSendBtn">
                        <i class="fas fa-paper-plane"></i>
                    </div>
                </div>
            </div>
        </div>

    </main>

</div>

<script>
// --- Elements ---
const welcomeScreen = document.getElementById('welcomeScreen');
const activeChat = document.getElementById('activeChat');
const chatMessages = document.getElementById('chatMessages');

const welcomeInput = document.getElementById('welcomeInput');
const welcomeSendBtn = document.getElementById('welcomeSendBtn');
const chatInputActive = document.getElementById('chatInputActive');
const activeSendBtn = document.getElementById('activeSendBtn');

let chatStarted = false;

function switchToActiveChat() {
    if (!chatStarted) {
        chatStarted = true;
        welcomeScreen.style.display = 'none';
        activeChat.style.display = 'flex';
        chatInputActive.focus();
    }
}

function addMessage(text, sender) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `chat-bubble ${sender}`;
    msgDiv.textContent = text;
    chatMessages.appendChild(msgDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return msgDiv;
}

// --- Send Message to Gemini ---
async function sendMessage(inputEl) {
    const message = inputEl.value.trim();
    if (!message) return;

    // Switch to active chat layout
    switchToActiveChat();

    // Show user message
    addMessage(message, 'user');
    inputEl.value = '';

    // Show typing indicator
    const typingDiv = addMessage('Thinking...', 'bot typing');

    try {
        const response = await fetch('/chatbot/ask/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCsrfToken(),
            },
            body: JSON.stringify({ message }),
        });

        const data = await response.json();

        // Remove typing indicator
        typingDiv.remove();

        if (data.response) {
            addMessage(data.response, 'bot');
        } else if (data.error) {
            addMessage('Error: ' + data.error, 'bot error');
        }
    } catch (err) {
        typingDiv.remove();
        addMessage('Something went wrong. Please try again.', 'bot error');
    }
}

// Get CSRF token from cookies (Django requirement)
function getCsrfToken() {
    const cookies = document.cookie.split(';');
    for (let cookie of cookies) {
        const [name, value] = cookie.trim().split('=');
        if (name === 'csrftoken') return value;
    }
    return '';
}

// --- Event Listeners for both inputs ---
welcomeSendBtn.addEventListener('click', () => sendMessage(welcomeInput));
welcomeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage(welcomeInput);
});

activeSendBtn.addEventListener('click', () => sendMessage(chatInputActive));
chatInputActive.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage(chatInputActive);
});

// --- File Upload Script ---
let uploadedFiles = [];

function setupFileUpload(fileInputId, containerId) {
    document.getElementById(fileInputId).addEventListener('change', function(e) {
        const files = e.target.files;
        const container = document.getElementById(containerId);

        for (let file of files) {
            if (file.type.startsWith('image/')) {
                const id = Date.now() + Math.random();
                const url = URL.createObjectURL(file);
                uploadedFiles.push({id, file, url});

                const div = document.createElement('div');
                div.className = "uploaded-file";
                div.id = id;
                div.innerHTML = `
                    <img src="${url}">
                    <div class="delete-icon" onclick="removeFile('${id}')">
                        <i class="fas fa-times"></i>
                    </div>
                `;
                container.appendChild(div);
            }
        }
        e.target.value = "";
    });
}

setupFileUpload('file-upload', 'uploadedFilesContainer');
setupFileUpload('file-upload-active', 'uploadedFilesContainerActive');

function removeFile(id) {
    const fileElement = document.getElementById(id);
    if (fileElement) {
        const index = uploadedFiles.findIndex(f => f.id == id);
        if (index > -1) {
            URL.revokeObjectURL(uploadedFiles[index].url);
            uploadedFiles.splice(index, 1);
        }
        fileElement.remove();
    }
}

// --- Sidebar Toggle Script ---
const menuIcon = document.querySelector('.menu-icon');
const sidebar = document.querySelector('.sidebar');
const chatArea = document.querySelector('.chat-area');

menuIcon.addEventListener('click', () => {
    sidebar.classList.toggle('hidden');
    chatArea.classList.toggle('full-width');
});

// --- Announcements Popup Script ---
const notifIcon = document.querySelector('.notif-icon');
const announcementsPopup = document.getElementById('announcementsPopup');

if (notifIcon && announcementsPopup) {
    notifIcon.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        announcementsPopup.style.display = announcementsPopup.style.display === 'block' ? 'none' : 'block';
    });

    document.addEventListener('click', (e) => {
        if (announcementsPopup.style.display === 'block' && 
            !notifIcon.contains(e.target) && 
            !announcementsPopup.contains(e.target)) {
            announcementsPopup.style.display = 'none';
        }
    });
}
</script>

</body>
</html>
