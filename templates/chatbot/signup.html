{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Sign Up - IntelliChat</title>

<link rel="stylesheet" href="{% static 'css/signup.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body>

<div class="logo-section">
<img src="{% static 'images/logo.png' %}" alt="IntelliChat Logo" class="auth-logo">
</div>

<div class="auth-container">
<div class="auth-card">
<div class="auth-form">

<h2>Register</h2>
<p class="auth-subtitle">Neque porro quisquam est qui dolorem ipsum</p>

<form class="signup-form" id="signupForm" method="POST" action="{% url 'signup' %}">
{% csrf_token %}

<!-- PERSONAL INFORMATION -->

<div class="form-section">

<h3>Personal Information</h3>

<div class="form-row">

<div class="form-group">
<label for="firstName">First name</label>

<div class="input-wrapper">
<i class="fas fa-user"></i>
<input type="text" id="firstName" name="firstName" placeholder="First name" required>
</div>

</div>

<div class="form-group">
<label for="lastName">Last name</label>

<div class="input-wrapper">
<i class="fas fa-user"></i>
<input type="text" id="lastName" name="lastName" placeholder="Last name" required>
</div>

</div>

</div>

</div>


<!-- ACCOUNT INFORMATION -->

<div class="form-section">

<h3>Account Information</h3>

<div class="form-row">

<div class="form-group">

<label for="email">TIP e-mail</label>

<div class="input-wrapper">
<i class="fas fa-envelope"></i>
<input type="email"
       id="email"
       name="email"
       placeholder="TIP e-mail"
       pattern="^[a-zA-Z0-9._%+-]+@tip\.edu\.ph$"
       title="Please use a TIP email"
       required>
</div>

</div>

<div class="form-group">

<label for="studentNumber">Student number</label>

<div class="input-wrapper">
<i class="fas fa-id-card"></i>
<input type="text" id="studentNumber" name="studentNumber" placeholder="Student number" required>
</div>

</div>

</div>

<br>

<div class="form-row">

<div class="form-group">

<label for="password">Password</label>

<div class="input-wrapper">
<i class="fas fa-lock"></i>
<input type="password" id="password" name="password" placeholder="Password" required>
<i class="fas fa-eye eye-icon" onclick="togglePassword('password',this)"></i>
</div>

</div>

<div class="form-group">

<label for="confirmPassword">Re-enter password</label>

<div class="input-wrapper">
<i class="fas fa-lock"></i>
<input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" required>
<i class="fas fa-eye eye-icon" onclick="togglePassword('confirmPassword',this)"></i>
</div>

</div>

</div>

</div>


<button type="submit" class="auth-btn">Sign up</button>

<div class="auth-footer">
<p>Already have an account? 
<a href="{% url 'login' %}" class="auth-link">Login here</a>
</p>
</div>

</form>

</div>
</div>
</div>


<script>
function togglePassword(fieldId,icon){
    const field=document.getElementById(fieldId);
    if(field.type==="password"){
        field.type="text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        field.type="password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}

const form=document.querySelector(".signup-form");
const email=document.getElementById("email");
const password=document.getElementById("password");
const confirmPassword=document.getElementById("confirmPassword");

email.addEventListener("input",()=>email.setCustomValidity(""));
password.addEventListener("input",()=>confirmPassword.setCustomValidity(""));
confirmPassword.addEventListener("input",()=>confirmPassword.setCustomValidity(""));

form.addEventListener("submit",function(e){
    e.preventDefault();

    email.setCustomValidity("");
    confirmPassword.setCustomValidity("");

    if(!form.checkValidity()){
        return;
    }

    const emailValue=email.value.trim().toLowerCase();

    if(!emailValue.endsWith("@tip.edu.ph")){
        email.setCustomValidity("Must be a TIP Email");
        email.reportValidity();
        return;
    }

    if(password.value!==confirmPassword.value){
        confirmPassword.setCustomValidity("Passwords do not match");
        confirmPassword.reportValidity();
        return;
    }

    window.location.href = "{% url 'chatbot_home' %}";
});

</script>

</body>
</html>
