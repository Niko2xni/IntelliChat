    <div class="sidebar-header">
        <button class="sidebar-toggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
    
    <nav class="sidebar-nav">
        <ul>
            <li>
                <a href="{% url 'dashboard:index' %}" class="nav-item active">
                    <span class="icon">📊</span>
                    <span class="label">Dashboard</span>

            </li>
            <li>

            <li>

            <li>

                    {% else %}
