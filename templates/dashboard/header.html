{% load static %}
<header class="header">
    <div class="header-content">
        <div class="logo">
            <h1>IntelliChat</h1>
        </div>
        <div class="header-right">
            <div class="header-icons">
                <!-- Notification Icon -->
                <div class="notification-wrapper">
                    <button class="header-icon notif-icon notification-btn" title="Notifications">
                        <i class="fas fa-bell"></i>
                        <span class="notif-badge" style="display: none;">0</span>
                    </button>
                    
                    <!-- Notification Dropdown -->
                    <div id="notificationDropdown" class="notification-dropdown" style="display: none;">
                        <div class="notification-header">
                            <h3>Notifications</h3>
                            <button id="markAllReadBtn" class="mark-all-read-btn">Mark all as read</button>
                        </div>
                        <div class="notification-list">
                            <!-- Notifications will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="user-menu">
                <a href="{% url 'dashboard:profile' %}" class="user-btn" title="My Profile" style="display:flex; align-items:center; justify-content:center; text-decoration:none;">
                    {% if user.is_authenticated and user.profile_picture %}
                    <img src="{{ user.profile_picture.url }}" alt="Profile" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover;">
                    {% else %}
                    <span class="icon"><i class="fas fa-user"></i></span>
                    {% endif %}
                </a>
            </div>
        </div>
    </div>
</header>

<script src="{% static 'js/notifications.js' %}"></script>
