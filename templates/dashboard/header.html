{% load static %}
<header class="header">
    <div class="header-content">
        <div class="logo">
            <h1>IntelliChat</h1>
        </div>
        <div class="header-right">
            <div class="notifications">
                <button class="notification-btn" title="Messages">
                    <span class="icon">💬</span>
                    <span class="badge">3</span>
                </button>
            </div>
            <div class="user-menu">
                <a href="{% url 'dashboard:profile' %}" class="user-btn" title="My Profile" style="display:flex; align-items:center; justify-content:center; text-decoration:none;">
                    {% if user.is_authenticated and user.profile_picture %}
                    <img src="{{ user.profile_picture.url }}" alt="Profile" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover;">
                    {% else %}
                    <span class="icon">👤</span>
                    {% endif %}
                </a>
            </div>
        </div>
    </div>
</header>
