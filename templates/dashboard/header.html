{% load static %}
<header class="header">
    <div class="header-content">
        <div class="logo">
            <h1>IntelliChat</h1>
        </div>
        <div class="header-right">
            <div class="notifications">
                <button class="notification-btn" title="Messages">
                    <span class="icon">💬</span>
                    <span class="badge">3</span>
                </button>
            </div>
            <div class="user-menu">
                <a href="{% url 'dashboard:profile' %}" class="user-btn" title="My Profile">
                    <span class="icon">👤</span>
                </a>
            </div>
        </div>
    </div>
</header>
